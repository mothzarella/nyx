name: Build x86-64 Linux
on:
  merge_group:
    branches: [main]
  workflow_call:
    inputs:
      is_workflow_call:
        type: boolean
        required: false
        default: true
      commit-failures:
        description: Commit failures.nix
        required: false
        default: true
        type: boolean
      pin:
        description: Pin strategy
        required: false
        default: "none"
        type: string
    outputs:
      built:
        description: "Returns true if the build step succeeded"
        value: ${{ jobs.build-all-x86_64-linux.outputs.built }}
  workflow_dispatch:
    inputs:
      commit-failures:
        description: Commit failures.nix
        required: false
        default: true
        type: boolean
      pin:
        description: Pin strategy
        required: false
        default: "none"
        type: choice
        options:
          - new
          - full
          - missing
          - none
  # actually skipping `pull_request_target` below, but needed for PR status
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: build-all-x86_64-linux-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  build-all-check-files:
    name: Build-all check changed files
    if: github.event_name == 'pull_request_target' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    outputs:
      flake_changed: ${{ steps.check.outputs.flake_changed }}
      cachyos_changed: ${{ steps.check.outputs.cachyos_changed }}
      browser_changed: ${{ steps.check.outputs.browser_changed }}
      standard_changed: ${{ steps.check.outputs.standard_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Check changed files
        id: check
        run: |
          DIFF=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

          if echo "$DIFF" | grep -q "^flake\.lock$"; then echo "flake_changed=true" >> "$GITHUB_OUTPUT"; else echo "flake_changed=false" >> "$GITHUB_OUTPUT"; fi
          if echo "$DIFF" | grep -Eq "^pkgs/linux-cachyos/"; then echo "cachyos_changed=true" >> "$GITHUB_OUTPUT"; else echo "cachyos_changed=false" >> "$GITHUB_OUTPUT"; fi
          if echo "$DIFF" | grep -Eq "^pkgs/(nss-git|firefox-nightly)/"; then echo "browser_changed=true" >> "$GITHUB_OUTPUT"; else echo "browser_changed=false" >> "$GITHUB_OUTPUT"; fi
          if echo "$DIFF" | grep -qEv "^(pkgs/linux-cachyos/|pkgs/nss-git/|pkgs/firefox-nightly/)"; then echo "standard_changed=true" >> "$GITHUB_OUTPUT"; else echo "standard_changed=false" >> "$GITHUB_OUTPUT"; fi

  call-build-matrix-x86_64-linux:
    name: Call Build Matrix x86-64 Linux
    needs: build-all-check-files
    if: needs.build-all-check-files.outputs.flake_changed == 'true' || needs.build-all-check-files.outputs.cachyos_changed == 'true'
    uses: ./.github/workflows/build-matrix-x86_64-linux.yml
    secrets: inherit

  call-garuda-build-all-x86_64-linux:
    name: Call Garuda Build-all x86-64 Linux
    needs: [build-all-check-files, call-build-matrix-x86_64-linux]
    if: |
      !failure() && !cancelled() &&
      github.event_name == 'pull_request_target' &&
      (needs.build-all-check-files.outputs.cachyos_changed == 'true' || needs.build-all-check-files.outputs.browser_changed == 'true')
    uses: ./.github/workflows/garuda-build-all-x86_64-linux.yml
    secrets: inherit

  build-all-x86_64-linux:
    name: Build-all x86-64 Linux
    needs: [build-all-check-files, call-build-matrix-x86_64-linux]
    if: |
      !failure() && !cancelled() &&
      github.event.pull_request.draft != true &&
      (github.event_name == 'workflow_dispatch' || inputs.is_workflow_call == true || (github.event_name == 'pull_request_target' && needs.build-all-check-files.outputs.standard_changed == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    outputs:
      built: ${{ steps.build.outcome == 'success' }}
    steps:
      # identical to build.yml
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            sandbox-fallback = false
            system-features = big-parallel gccarch-x86-64-v3
            substituters = https://nyx-cache.chaotic.cx/ https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nyx-cache.chaotic.cx:dJxTrgMC3V3cFfyIiBQDQorG6k1LsqurH/srpMSq7qk=
          install_options: --daemon
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      # config to commit
      - name: Bat-signal
        run: |
          set -e
          git config --global user.name 'Chaotic Github Actions'
          git config --global user.email 'actions@chaotic.cx'
      # similar to build.yml
      - name: Create niks3 auth-token
        run: |
          export XDG_CONFIG_HOME=${XDG_CONFIG_HOME:-$HOME/.config}
          mkdir -p "$XDG_CONFIG_HOME"/niks3/
          printf "%s" "$NIKS3_TOKEN" > "$XDG_CONFIG_HOME"/niks3/auth-token
          wc "$XDG_CONFIG_HOME"/niks3/auth-token
        env:
          NIKS3_TOKEN: ${{ secrets.NIKS3_TOKEN }}
      # the building
      - name: Build
        if: (success())
        id: build
        run: |
          nix run ./maintenance#chaotic-nyx.builder || [ $? -eq 42 ]
          failed_builds="$(cat ${{ runner.temp }}/failures.txt | sed 's/^/    <li>/; s/$/<\/li>/')"
          failed_builds_count="$(cat ${{ runner.temp }}/failures.txt | wc -l)"
          unbuildable_count="$(cat ${{ runner.temp }}/eval-failures.txt | wc -l)"
          echo "FAILED_BUILDS_COUNT=$failed_builds_count
          UNBUILDABLE_COUNT=$unbuildable_count
          FAILED_BUILDS<<EOF
          $failed_builds
          EOF" >> "$GITHUB_OUTPUT"
          if [ "$SAVE_FAILURES" = "true" ] && [ -n "$TARGET_BRANCH" ]; then
            cp ${{ runner.temp }}/new-failures.nix ./maintenance/failures.x86_64-linux.nix
            git add ./maintenance/failures.x86_64-linux.nix
            git commit -m "failures: update x86_64-linux" && git push origin HEAD:"$TARGET_BRANCH" || true
          fi
        env:
          NYX_WD: ${{ runner.temp }}
          NYX_PUSH_ALL: ${{ github.event_name == 'pull_request_target' && '0' || '1' }}
          NYX_PIN: ${{ inputs.pin || 'none' }}
          SAVE_FAILURES: ${{ (github.event_name == 'pull_request_target' && needs.build-all-check-files.outputs.flake_changed == 'true') || inputs.commit-failures || false }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - name: Comment on commit
        if: (success())
        uses: actions/github-script@v9
        with:
          script: |
            if (process.env.FAILED_BUILDS_COUNT > 0) {
              var extratext = "";
              if (process.env.SAVE_FAILURES !== "true")
                core.setFailed("Build failures found!");
              // Check if github actions triggered the event
              if (process.env.ACTOR == "github-actions[bot]")
                extratext = `\nNew build failures found!`
              else
                extratext = `\nNew build failures found! @${process.env.ACTOR}`
              github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: `Failed to build ${process.env.FAILED_BUILDS_COUNT} packages:
            <details>
              <summary>${process.env.FAILED_BUILDS_COUNT} packages failed</summary>
              <ul>
                ${process.env.FAILED_BUILDS}
              </ul>
            </details>${extratext}`
              })
            } else
              github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: `All packages were built and cached successfully! (${process.env.UNBUILDABLE_COUNT} not suitable for building)`
              })
        env:
          SAVE_FAILURES: ${{ (github.event_name == 'pull_request_target' && needs.build-all-check-files.outputs.flake_changed == 'true') || inputs.commit-failures || false }}
          FAILED_BUILDS_COUNT: ${{ steps.build.outputs.FAILED_BUILDS_COUNT }}
          UNBUILDABLE_COUNT: ${{ steps.build.outputs.UNBUILDABLE_COUNT }}
          FAILED_BUILDS: ${{ steps.build.outputs.FAILED_BUILDS }}
          ACTOR: ${{ github.actor }}
      - name: Upload logs
        if: ((success() || failure()) && steps.build.outcome != 'skipped')
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: |
            ${{ runner.temp }}/*.txt
            ${{ runner.temp }}/*.nix
